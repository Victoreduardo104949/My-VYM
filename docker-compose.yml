services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vym_user
      POSTGRES_PASSWORD: vym_password
      POSTGRES_DB: vym_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://vym_user:vym_password@db:5432/vym_db
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - db
    restart: always

volumes:
  pgdata:
